name: ByteFlow Daily Reel

on:
  schedule:
    - cron: '0 9 */2 * *'   # her 2 günde bir, 09:00 UTC (12:00 TR)
  workflow_dispatch:
    inputs:
      publish:
        description: "Instagram'a yayınla (kapatırsan sadece render + push, test için)"
        type: boolean
        default: true

permissions:
  contents: write   # public/latest.mp4 push
  issues: write     # token expiry uyarısı

concurrency:
  group: byteflow-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sistem bağımlılıkları (ffmpeg + fontlar)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-color-emoji fonts-jetbrains-mono || sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      - name: Bağımlılıklar (root + render + chromium)
        run: |
          npm ci
          cd render
          npm ci
          npx playwright install --with-deps chromium

      - name: Video üret (trend → Gemini → render → müzik)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node run-daily.mjs

      - name: Videoyu barındır (repo'ya push)
        run: |
          cp dist/final.mp4 public/latest.mp4
          git config user.name "byteflow-bot"
          git config user.email "byteflow-bot@users.noreply.github.com"
          git add -f public/latest.mp4 scene-spec.generated.json render/scene-spec.json
          git commit -m "chore: daily reel $(date -u +%F)" || echo "değişiklik yok"
          git push

      - name: Instagram'a yayınla
        if: ${{ github.event_name == 'schedule' || inputs.publish }}
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          node publish/publish-latest.mjs "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${SHA}/public/latest.mp4"

      - name: Token expiry guard
        if: always()
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node publish/check-token-expiry.mjs
